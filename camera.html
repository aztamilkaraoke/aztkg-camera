<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta charset="utf-8" />
  <title>AZTKG Camera Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1220;
    --panel:#111827;
    --panel2:#182235;
    --line:rgba(255,255,255,.08);
    --text:#f8fafc;
    --muted:#cbd5e1;
    --dim:#94a3b8;
    --danger:#991b1b;
    --warn:#92400e;
    --shadow:0 18px 40px rgba(0,0,0,.35);
    --radius:18px;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:Inter,Arial,sans-serif;
  }

  body{
    overflow:hidden;
  }

  .app{
    min-height:100%;
    height:100%;
    display:flex;
    flex-direction:column;
  }

  .topbar{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:8px 10px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }

  .topPill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 9px;
    border-radius:999px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--line);
    font-size:10px;
    font-weight:900;
    color:var(--muted);
    line-height:1.1;
  }

  .main{
    flex:1 1 auto;
    overflow:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .card{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:12px;
  }

.seq{
  font-size:12px;
  font-weight:900;
  color:var(--muted);
  line-height:1.2;
  letter-spacing:.2px;
}

.song{
  margin-top:8px;
  font-size:22px;
  line-height:1.12;
  font-weight:900;
  word-break:break-word;
}

.singers{
  margin-top:10px;
  font-size:15px;
  font-weight:800;
  color:var(--muted);
  line-height:1.28;
}

  .meta{
    margin-top:0;
    display:flex;
    flex-direction:column;
    gap:0;
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    line-height:1.2;
  }

  .meta:empty{
    display:none;
  }

.statusWrap{
  margin-top:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  flex-wrap:wrap;
}

  .statusPill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:36px;
    padding:8px 12px;
    border-radius:999px;
    background:#334155;
    border:1px solid rgba(255,255,255,.08);
    font-size:12px;
    font-weight:900;
    color:#fff;
    line-height:1.1;
  }

  .statusPill.recording{background:var(--danger)}
  .statusPill.saving{background:var(--warn)}

  .elapsed{
    font-size:20px;
    font-weight:900;
    color:#fff;
    line-height:1.1;
  }

  .recentTitle{
    font-size:11px;
    font-weight:900;
    letter-spacing:.8px;
    color:var(--dim);
    text-transform:uppercase;
    line-height:1.1;
  }

  .recentText{
    margin-top:6px;
    font-size:13px;
    font-weight:800;
    color:var(--muted);
    line-height:1.25;
  }

  .previewWrap{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  video{
    width:100%;
    border-radius:16px;
    background:#000;
    display:block;
    aspect-ratio:16/9;
    object-fit:cover;
    max-height:52vh;
  }

  .debugLine{
    font-size:11px;
    font-weight:800;
    color:var(--dim);
    line-height:1.2;
  }

  .warnLine{
    color:#fca5a5;
  }

  .btnRow{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .btn{
    border:0;
    border-radius:12px;
    min-height:40px;
    padding:0 12px;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
  }

  .btnDanger{
    background:#7f1d1d;
    color:#fff;
  }

  .btnGhost{
    background:#1f2937;
    color:#fff;
    border:1px solid var(--line);
  }
  @media (orientation: landscape) {
    .app{
      height:100vh;
    }

    .topbar{
      flex:0 0 auto;
      padding:5px 8px;
      gap:4px;
    }

    .topPill{
      font-size:9px;
      padding:4px 7px;
      line-height:1;
    }

    .main{
      flex:1 1 auto;
      min-height:0;
      overflow:hidden;
      padding:6px;
      display:grid;
      grid-template-columns:minmax(320px, 1.05fr) minmax(360px, 1.15fr);
      grid-template-areas:
        "focus preview"
        "recent preview";
      grid-template-rows:auto auto;
      gap:6px;
      align-items:start;
      align-content:start;
    }

    .main > .card:nth-child(1){
      grid-area:focus;
      min-height:0;
      align-self:start;
      padding-bottom:12px;
    }

    .main > .card:nth-child(2){
      grid-area:preview;
      min-height:0;
      height:100%;
      align-self:stretch;
    }

    .main > .card:nth-child(3){
      grid-area:recent;
      align-self:start;
    }

    .card{
      padding:7px 8px;
      min-height:0;
      overflow:hidden;
    }

    .main > .card:nth-child(3){
      padding:6px 8px;
    }

    .seq{
      font-size:10px;
      line-height:1;
    }

    .song{
      margin-top:4px;
      font-size:17px;
      line-height:1.02;
    }

    .singers{
      margin-top:4px;
      font-size:12.5px;
      line-height:1.08;
    }

    .meta{
      margin-top:4px;
      gap:1px;
      font-size:9px;
      line-height:1.05;
    }

    .statusWrap{
      margin-top:8px;
      gap:6px;
      flex-wrap:wrap;
    }

    .statusPill{
      min-height:28px;
      padding:5px 8px;
      font-size:9px;
    }

    .elapsed{
      font-size:15px;
      line-height:1;
    }

    .recentTitle{
      font-size:10px;
      line-height:1;
    }

    .recentText{
      margin-top:4px;
      font-size:11px;
      line-height:1.1;
    }

    .previewWrap{
      display:flex;
      flex-direction:column;
      gap:5px;
      min-height:0;
      height:100%;
      overflow:hidden;
    }

    video{
      width:100%;
      height:auto;
      max-height:min(41vh, 220px);
      aspect-ratio:auto;
      object-fit:cover;
      flex:0 0 auto;
      display:block;
    }

    .debugLine{
      font-size:9px;
      line-height:1.05;
    }

    .btnRow{
      gap:5px;
      margin-top:auto;
      flex-wrap:nowrap;
    }

    .focusCard{
  min-height:230px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

    .btn{
      min-height:32px;
      padding:0 9px;
      font-size:9px;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topPill" id="camReady">Camera: —</div>
      <div class="topPill" id="netState">Network: —</div>
      <div class="topPill" id="recState">Recorder: —</div>
      <div class="topPill" id="quality">Quality: —</div>
      <div class="topPill" id="storageState">Storage: —</div>
      <div class="topPill" id="buildState">Build: 2026.03.11.02</div>
    </div>

    <div class="main">
      <div class="card focusCard">
        <div class="seq" id="seqNo">SEQ #—</div>
        <div class="song" id="songName">Waiting for host…</div>
        <div class="singers" id="singers">—</div>
        <div class="meta" id="meta"><div>—</div></div>
        <div class="statusWrap">
          <div class="statusPill" id="statusPill">NOT STARTED</div>
          <div class="elapsed" id="elapsed"></div>
        </div>
      </div>

      <div class="card previewWrap">
        <video id="preview" autoplay playsinline muted></video>
        <div class="debugLine" id="debugLine">Initializing camera…</div>

        <div class="btnRow">
          <button class="btn btnDanger" id="btnEmergencyStop" type="button">STOP RECORDING</button>
          <button class="btn btnGhost" id="btnArmStorage" type="button">EXPORT ALL CLIPS</button>
          <button class="btn btnGhost" id="btnRefreshState" type="button">REFRESH</button>
        </div>
      </div>

      <div class="card">
        <div class="recentTitle">Recorded Clips</div>
        <div class="recentText" id="recentText">—</div>
      </div>
    </div>
  </div>

  <script src="./camera.js?v=2026.03.11.02"></script>
</body>
</html>
