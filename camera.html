<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta charset="utf-8" />
  <title>AZTKG Camera Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111827;
      --panel2:#182235;
      --line:rgba(255,255,255,.08);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --dim:#94a3b8;
      --danger:#991b1b;
      --warn:#92400e;
      --shadow:0 18px 40px rgba(0,0,0,.35);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif}
    body{overflow:hidden}
    .app{min-height:100%;display:flex;flex-direction:column}
    .topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px}
    .topPill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:11px;font-weight:900;color:var(--muted)}
    .main{flex:1 1 auto;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
    .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .seq{font-size:15px;font-weight:900;color:var(--muted)}
    .song{margin-top:8px;font-size:31px;line-height:1.05;font-weight:900;word-break:break-word}
    .singers{margin-top:10px;font-size:20px;font-weight:800;color:var(--muted)}
    .meta{margin-top:12px;display:flex;flex-direction:column;gap:6px;font-size:14px;color:var(--muted);font-weight:700}
    .statusWrap{margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .statusPill{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 16px;border-radius:999px;background:#334155;border:1px solid rgba(255,255,255,.08);font-size:13px;font-weight:900;color:#fff}
    .statusPill.recording{background:var(--danger)}
    .statusPill.saving{background:var(--warn)}
    .elapsed{font-size:24px;font-weight:900;color:#fff}
    .recentTitle{font-size:12px;font-weight:900;letter-spacing:.8px;color:var(--dim);text-transform:uppercase}
    .recentText{margin-top:6px;font-size:14px;font-weight:800;color:var(--muted)}
    .previewWrap{display:flex;flex-direction:column;gap:8px}
    video{width:100%;border-radius:16px;background:#000;display:block;aspect-ratio:16/9;object-fit:cover}
    .debugLine{font-size:12px;font-weight:800;color:var(--dim)}
    .warnLine{color:#fca5a5}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:0;border-radius:14px;min-height:46px;padding:0 14px;font-size:13px;font-weight:900;cursor:pointer}
    .btnDanger{background:#7f1d1d;color:#fff}
    .btnGhost{background:#1f2937;color:#fff;border:1px solid var(--line)}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topPill" id="camReady">Camera: —</div>
      <div class="topPill" id="netState">Network: —</div>
      <div class="topPill" id="recState">Recorder: —</div>
      <div class="topPill" id="quality">Quality: —</div>
    </div>

    <div class="main">
      <div class="card">
        <div class="seq" id="seqNo">SEQ #—</div>
        <div class="song" id="songName">Waiting for host…</div>
        <div class="singers" id="singers">—</div>
        <div class="meta" id="meta"><div>—</div></div>
        <div class="statusWrap">
          <div class="statusPill" id="statusPill">NOT STARTED</div>
          <div class="elapsed" id="elapsed"></div>
        </div>
      </div>

      <div class="card">
        <div class="recentTitle">Recently recorded</div>
        <div class="recentText" id="recentText">—</div>
      </div>

      <div class="card previewWrap">
        <video id="preview" autoplay playsinline muted></video>
        <div class="debugLine" id="debugLine">Initializing camera…</div>

        <div class="btnRow">
          <button class="btn btnDanger" id="btnEmergencyStop" type="button">STOP RECORDING</button>
          <button class="btn btnGhost" id="btnRefreshState" type="button">REFRESH</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./camera.js"></script>
</body>
</html>
