<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta charset="utf-8" />
  <title>AZTKG Camera Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1220;
    --panel:#111827;
    --panel2:#182235;
    --line:rgba(255,255,255,.08);
    --text:#f8fafc;
    --muted:#cbd5e1;
    --dim:#94a3b8;
    --danger:#991b1b;
    --warn:#92400e;
    --shadow:0 18px 40px rgba(0,0,0,.35);
    --radius:18px;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:Inter,Arial,sans-serif;
  }

  body{
    overflow:hidden;
  }

  .app{
    min-height:100%;
    height:100%;
    display:flex;
    flex-direction:column;
  }

  .topbar{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:8px 10px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }

  .topPill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 9px;
    border-radius:999px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--line);
    font-size:10px;
    font-weight:900;
    color:var(--muted);
    line-height:1.1;
  }

  .main{
    flex:1 1 auto;
    overflow:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .card{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:12px;
  }

  .focusTopRow{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  flex-wrap:wrap;
}

.seq{
  font-size:12px;
  font-weight:900;
  color:var(--muted);
  line-height:1.2;
  letter-spacing:.2px;
  flex:1 1 auto;
  min-width:0;
}

.song{
  margin-top:12px;
  font-size:22px;
  line-height:1.14;
  font-weight:900;
  word-break:break-word;
}

.singers{
  margin-top:12px;
  font-size:15px;
  font-weight:800;
  color:var(--muted);
  line-height:1.3;
}

  .meta{
    margin-top:0;
    display:flex;
    flex-direction:column;
    gap:0;
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    line-height:1.2;
  }

  .meta:empty{
    display:none;
  }

.statusWrap{
  margin-top:14px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:8px;
  flex-wrap:wrap;
  min-height:24px;
}

.statusPill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:28px;
  padding:5px 10px;
  border-radius:999px;
  background:#334155;
  border:1px solid rgba(255,255,255,.08);
  font-size:10px;
  font-weight:900;
  color:#fff;
  line-height:1.1;
  white-space:nowrap;
}

  .statusPill.recording{background:var(--danger)}
  .statusPill.saving{background:var(--warn)}

  .elapsed{
    font-size:20px;
    font-weight:900;
    color:#fff;
    line-height:1.1;
  }

  .recentTitle{
    font-size:11px;
    font-weight:900;
    letter-spacing:.8px;
    color:var(--dim);
    text-transform:uppercase;
    line-height:1.1;
  }

  .recentText{
    margin-top:6px;
    font-size:13px;
    font-weight:800;
    color:var(--muted);
    line-height:1.25;
  }

  .previewWrap{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  video{
    width:100%;
    border-radius:16px;
    background:#000;
    display:block;
    aspect-ratio:16/9;
    object-fit:cover;
    max-height:52vh;
  }

  .debugLine{
    font-size:11px;
    font-weight:800;
    color:var(--dim);
    line-height:1.2;
  }

  .warnLine{
    color:#fca5a5;
  }

  .btnRow{
    display:flex;
    gap:8px;
    margin-top:8px;
    flex-wrap:wrap;
  }

  .btn{
    border:0;
    border-radius:12px;
    min-height:40px;
    padding:0 12px;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
  }

  .btnDanger{
    background:#7f1d1d;
    color:#fff;
  }

  .btnGhost{
    background:#1f2937;
    color:#fff;
    border:1px solid var(--line);
  }
  @media (orientation: landscape) {
    .app{
      height:100vh;
    }

        .focusTopRow{
      gap:6px;
    }

    .topbar{
      flex:0 0 auto;
      padding:5px 8px;
      gap:4px;
    }

    .topPill{
      font-size:9px;
      padding:4px 7px;
      line-height:1;
    }

    .main{
      flex:1 1 auto;
      min-height:0;
      overflow:hidden;
      padding:6px;
      display:grid;
      grid-template-columns:minmax(300px, 0.98fr) minmax(380px, 1.22fr);
      grid-template-areas:
        "focus preview"
        "recent preview";
      grid-template-rows:auto auto;
      gap:6px;
      align-items:start;
      align-content:start;
    }

.main > .card:nth-child(1){
  grid-area:focus;
  min-height:0;
  align-self:start;
  padding-bottom:6px;
}

    .main > .card:nth-child(2){
      grid-area:preview;
      min-height:0;
      height:100%;
      align-self:stretch;
    }

    .main > .card:nth-child(3){
      grid-area:recent;
      align-self:start;
    }

    .card{
      padding:7px 8px;
      min-height:0;
      overflow:hidden;
    }

    .main > .card:nth-child(3){
      padding:6px 8px;
    }

    .seq{
      font-size:10px;
      line-height:1.05;
    }

.song{
  margin-top:10px;
  font-size:17px;
  line-height:1.08;
}

.singers{
  margin-top:10px;
  font-size:12.5px;
  line-height:1.16;
}

    .meta{
      margin-top:4px;
      gap:1px;
      font-size:9px;
      line-height:1.05;
    }

.statusWrap{
  margin-top:8px;
  gap:4px;
  flex-wrap:wrap;
  min-height:14px;
}

.statusPill{
  min-height:18px;
  padding:2px 7px;
  font-size:7px;
}

    .elapsed{
      font-size:15px;
      line-height:1;
    }

    .recentTitle{
      font-size:10px;
      line-height:1;
    }

    .recentText{
      margin-top:4px;
      font-size:11px;
      line-height:1.1;
    }

    .previewWrap{
      display:flex;
      flex-direction:column;
      gap:5px;
      min-height:0;
      height:100%;
      overflow:hidden;
    }

    video{
      width:100%;
      height:auto;
      max-height:min(41vh, 220px);
      aspect-ratio:auto;
      object-fit:cover;
      flex:0 0 auto;
      display:block;
    }

    .debugLine{
      font-size:9px;
      line-height:1.05;
    }

    .btnRow{
      gap:5px;
      margin-top:8px;
      flex-wrap:nowrap;
    }

.focusCard{
  min-height:176px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

    .btn{
      min-height:32px;
      padding:0 9px;
      font-size:9px;
    }
  }

    .hidden{ display:none !important; }

  .accessGate{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
    background:
      radial-gradient(1200px 800px at 18% 12%, rgba(255,255,255,.12), transparent 62%),
      radial-gradient(1000px 760px at 82% 18%, rgba(255,255,255,.08), transparent 62%),
      linear-gradient(180deg, var(--panel2), var(--panel), var(--bg));
  }

  .accessGateBg{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(900px 420px at 50% 8%, rgba(255,255,255,.05), transparent 65%);
  }

  .accessGateInner{
    position:relative;
    z-index:1;
    width:min(620px, calc(100vw - 48px));
  }

  .accessGateCard{
    border-radius:var(--radius);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    backdrop-filter:blur(12px);
    padding:34px 32px 28px;
    text-align:center;
  }

  .accessGateBrandRow{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
  }

  .accessGateLogo{
    width:72px;
    height:72px;
    border-radius:50%;
    object-fit:cover;
    flex:0 0 auto;
  }

  .accessGateGroup{
    font-size:36px;
    font-weight:900;
    letter-spacing:.4px;
    color:var(--text);
    line-height:1;
    white-space:nowrap;
  }

  .accessGateTitle{
    margin-top:14px;
    font-size:28px;
    font-weight:800;
    line-height:1.1;
    color:var(--text);
    opacity:.9;
    text-align:center;
  }

  .accessGateSub{
    margin-top:14px;
    font-size:17px;
    line-height:1.5;
    color:var(--dim);
  }

  .accessGateForm{
    margin-top:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .accessGateInput{
    width:180px;
    height:56px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:var(--text);
    text-align:center;
    font-size:28px;
    font-weight:900;
    letter-spacing:6px;
    outline:none;
  }

  .accessGateInput::placeholder{
    letter-spacing:1px;
    font-size:20px;
    font-weight:700;
    color:rgba(246,248,255,.38);
  }

  .accessGateBtn{
    height:56px;
    padding:0 22px;
    border:0;
    border-radius:16px;
    background:rgba(255,255,255,.12);
    color:var(--text);
    font-size:16px;
    font-weight:900;
    letter-spacing:.4px;
    cursor:pointer;
    box-shadow:var(--shadow);
  }

  .accessGateBtn:disabled{
    opacity:.65;
    cursor:default;
  }

  .accessGateError{
    margin-top:14px;
    color:#fca5a5;
    font-size:14px;
    font-weight:800;
  }

  .accessGateBusy{
    margin-top:14px;
    color:var(--dim);
    font-size:14px;
    font-weight:800;
  }

    @media (orientation: portrait) {
    .accessGate{
      padding:18px;
      align-items:flex-start;
      padding-top:max(28px, env(safe-area-inset-top, 0px) + 16px);
    }

    .accessGateInner{
      width:100%;
      max-width:420px;
    }

    .accessGateCard{
      padding:24px 18px 22px;
    }

    .accessGateBrandRow{
      flex-direction:column;
      gap:12px;
    }

    .accessGateLogo{
      width:64px;
      height:64px;
    }

    .accessGateGroup{
      font-size:28px;
      line-height:1.08;
      white-space:normal;
      text-wrap:balance;
    }

    .accessGateTitle{
      margin-top:16px;
      font-size:24px;
      line-height:1.08;
    }

    .accessGateSub{
      margin-top:12px;
      font-size:15px;
      line-height:1.4;
    }

    .accessGateForm{
      margin-top:20px;
      flex-direction:column;
      align-items:stretch;
      gap:12px;
    }

    .accessGateInput{
      width:100%;
      height:56px;
      font-size:24px;
      letter-spacing:4px;
    }

    .accessGateBtn{
      width:100%;
      height:54px;
      font-size:16px;
    }
  }

    body.gateBoot .app{
    visibility:hidden;
  }  
</style>
</head>
